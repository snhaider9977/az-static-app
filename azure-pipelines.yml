trigger:
  branches:
    include:
      - dev
      - main

  paths:
    include:
      - frontend/**
      - azure-pipeline/frontend-pipeline.yml

variables:
  - group: static-var

stages:

# =====================================
# BUILD STAGE
# =====================================
  - stage: Build
    displayName: Build Frontend

    jobs:
      - job: BuildJob
        displayName: Build React App

        pool:
          vmImage: ubuntu-latest

        steps:
          - task: UseNode@1
            inputs:
              version: '18.x'
            displayName: Install Node.js

          - script: |
              cd frontend
              npm install
            displayName: Install dependencies

          - script: |
              cd frontend
              npm run build
            displayName: Build React application
            env:
              REACT_APP_ENV: $(REACT-APP-ENV)

          - task: PublishBuildArtifacts@1
            displayName: Publish Frontend Artifact
            inputs:
              PathtoPublish: 'frontend/dist'
              ArtifactName: 'frontend-dist'
              publishLocation: 'Container'

# =====================================
# DEV DEPLOYMENT
# =====================================
  - stage: DeployDev
    displayName: Deploy DEV Frontend
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/dev'))

    jobs:
      - job: DeployDevJob
        displayName: Deploy DEV Job

        pool:
          vmImage: ubuntu-latest

        steps:
          - task: DownloadBuildArtifacts@0
            displayName: Download Frontend Artifact
            inputs:
              buildType: current
              downloadType: single
              artifactName: frontend-dist
              downloadPath: $(System.ArtifactsDirectory)

          - script: |
              npm install -g @azure/static-web-apps-cli

              ls -R /home/vsts/work/1/a

              swa deploy "/home/vsts/work/1/a/frontend-dist" \
                --deployment-token $(token) \
                --env production
            displayName: Deploy DEV using SWA CLI
